<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ჩემი ამოცანები - TODO App</title>
    <link rel="icon" type="image/svg+xml" href="the-internet-svgrepo-com.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="emoji">✨</span>
            <h1>ჩემი ამოცანები</h1>
            <p>დაგეგმე და შეასრულე შენი დღევანდელი ამოცანები</p>
        </div>
        
        <div class="input-container">
            <input 
                type="text" 
                id="todoInput" 
                placeholder="დაამატე ახალი ამოცანა..."
                autocomplete="off"
            >
            <button id="addBtn">დამატება</button>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">ყველა</button>
            <button class="filter-btn" data-filter="active">აქტიური</button>
            <button class="filter-btn" data-filter="completed">დასრულებული</button>
        </div>

        <ul id="todoList"></ul>

        <div class="stats" id="stats">
            <div class="stat-item">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">სულ</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="activeCount">0</div>
                <div class="stat-label">აქტიური</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="completedCount">0</div>
                <div class="stat-label">დასრულებული</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
